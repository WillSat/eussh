name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and release'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_glob: "src-tauri/target/release/bundle/msi/*.msi src-tauri/target/release/bundle/nsis/*.exe"
          - os: ubuntu-latest
            artifact_glob: "src-tauri/target/release/bundle/deb/*.deb src-tauri/target/release/bundle/rpm/*.rpm src-tauri/target/release/bundle/appimage/*.AppImage"
          - os: macos-latest
            artifact_glob: "src-tauri/target/release/bundle/dmg/*.dmg"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend deps
        run: npm ci

      - name: Build Tauri
        run: npx tauri build

      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "Releasing tag: $TAG"

          # Create release (ignore error if already exists)
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "See [CHANGELOG](https://github.com/WillSat/eussh#%EF%B8%8F-%E6%9B%B4%E6%96%B0%E6%97%A5%E5%BF%97) for details." \
            --draft=false \
            || true

          set -- ${{ matrix.artifact_glob }}
          for pattern; do
            for file in $pattern; do
              if [ -f "$file" ]; then
                echo "Uploading $file"
                gh release upload "$TAG" "$file" --clobber
              fi
            done
          done
        shell: bash
