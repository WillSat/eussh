name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and release'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_glob: "src-tauri/target/release/bundle/msi/*.msi src-tauri/target/release/bundle/nsis/*.exe"
          - os: ubuntu-latest
            artifact_glob: "src-tauri/target/release/bundle/deb/*.deb src-tauri/target/release/bundle/rpm/*.rpm src-tauri/target/release/bundle/appimage/*.AppImage"
          - os: macos-latest
            artifact_glob: "src-tauri/target/release/bundle/dmg/*.dmg"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend deps
        run: npm ci

      # macOS: check if Developer ID certificate is available
      - name: Check Apple Developer ID certificate
        id: check-cert
        if: runner.os == 'macOS'
        env:
          APPLE_CERT: ${{ secrets.APPLE_SIGNING_CERTIFICATE }}
        run: |
          if [ -n "$APPLE_CERT" ]; then
            echo "has_cert=true" >> "$GITHUB_OUTPUT"
            echo "Found Apple Developer ID certificate"
          else
            echo "has_cert=false" >> "$GITHUB_OUTPUT"
            echo "No Apple certificate found, using ad-hoc signing"
          fi

      # macOS: import signing certificate into temporary keychain
      - name: Import Apple Developer ID certificate
        if: runner.os == 'macOS' && steps.check-cert.outputs.has_cert == 'true'
        env:
          APPLE_SIGNING_CERTIFICATE: ${{ secrets.APPLE_SIGNING_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          # Create and configure temp keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the .p12 certificate
          echo "$APPLE_SIGNING_CERTIFICATE" | base64 --decode > /tmp/apple-cert.p12
          security import /tmp/apple-cert.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Add keychain to search path
          security list-keychains -d user -s "$KEYCHAIN_PATH" "$(security list-keychains -d user | tr -d '"')"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Override tauri.conf.json signing identity with Developer ID
          python3 -c "
import json, os
with open('src-tauri/tauri.conf.json') as f:
    cfg = json.load(f)
cfg['bundle']['macOS']['signingIdentity'] = os.environ['APPLE_SIGNING_IDENTITY']
with open('src-tauri/tauri.conf.json', 'w') as f:
    json.dump(cfg, f, indent=2)
    f.write(chr(10))
"
          echo "Updated signing identity to: $APPLE_SIGNING_IDENTITY"
          echo "APPLE_TEAM_ID=$APPLE_TEAM_ID" >> "$GITHUB_ENV"

      - name: Build Tauri
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ env.APPLE_TEAM_ID }}
        run: npx tauri build

      # macOS: verify DMG integrity before upload
      - name: Verify macOS DMG
        if: runner.os == 'macOS'
        run: |
          DMG="src-tauri/target/release/bundle/dmg/eussh.dmg"
          if [ ! -f "$DMG" ]; then
            DMG=$(ls src-tauri/target/release/bundle/dmg/*.dmg 2>/dev/null | head -1)
          fi
          if [ -z "$DMG" ] || [ ! -f "$DMG" ]; then
            echo "ERROR: No DMG file found!"
            exit 1
          fi
          echo "=== DMG ==="
          ls -lh "$DMG"
          echo "=== Verifying DMG ==="
          hdiutil verify "$DMG" && echo "DMG verification: PASSED" || { echo "DMG verification: FAILED"; exit 1; }
          echo "=== Checking app signature ==="
          APP_BUNDLE=$(ls src-tauri/target/release/bundle/macos/*.app 2>/dev/null | head -1)
          if [ -n "$APP_BUNDLE" ]; then
            codesign -dvvv "$APP_BUNDLE" 2>&1 || echo "(Ad-hoc signing - no Developer ID, expected)"
          fi

      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "Releasing tag: $TAG"

          # Create release (ignore error if already exists)
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "See [CHANGELOG](https://github.com/WillSat/eussh#%EF%B8%8F-%E6%9B%B4%E6%96%B0%E6%97%A5%E5%BF%97) for details." \
            --draft=false \
            || true

          set -- ${{ matrix.artifact_glob }}
          for pattern; do
            for file in $pattern; do
              if [ -f "$file" ]; then
                echo "Uploading $file"
                gh release upload "$TAG" "$file" --clobber
              fi
            done
          done
        shell: bash
